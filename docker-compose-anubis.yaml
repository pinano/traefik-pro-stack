services:

  # ===========================
  # ANUBIS (base template - extended by docker-compose-anubis-generated.yaml)
  # ===========================
  anubis-base:
    image: ghcr.io/techarohq/anubis:v1.25.0
    restart: unless-stopped
    networks:
      - traefik
    read_only: true # prevents writes to container layer
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          # Set up defaults ${VAR:-default} in case we forget these in the .env
          cpus: '${ANUBIS_CPU_LIMIT:-0.10}'
          memory: '${ANUBIS_MEM_LIMIT:-32M}'
        reservations:
          memory: 16M
    environment:
      - TZ=${TZ}
      - BIND=:8080
      - DIFFICULTY=${ANUBIS_DIFFICULTY}
      - POLICY_FNAME=/botPolicy.yaml
      - 'TARGET= '
      - COOKIE_DYNAMIC_DOMAIN=true
      - ED25519_PRIVATE_KEY_HEX=${ANUBIS_REDIS_PRIVATE_KEY:-}
      # Now cookie prefix is set based on the domain name
      #- COOKIE_PREFIX=${ANUBIS_COOKIE_PREFIX:-anubis}
    security_opt:
      - no-new-privileges=true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/anubis/botPolicy-generated.yaml:/botPolicy.yaml:ro
    # Anubis exposes /healthz — monitored via built-in healthcheck flag.
    # The chainguard static image has no shell: use CMD array to call the binary directly.
    healthcheck:
      test: ["CMD", "/ko-app/anubis", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ===========================
  #  ANUBIS-ASSETS (Static files server for Anubis challenge pages)
  # ===========================
  anubis-assets:
    image: nginx:1.31.3-alpine3.24-slim
    restart: unless-stopped
    stop_grace_period: 20s
    volumes:
      - ./config/anubis/assets:/usr/share/nginx/html:ro
      - ./config/anubis/nginx-assets.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '64M'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - traefik
    security_opt:
      - no-new-privileges=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1/custom.css"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.services.anubis-assets.loadbalancer.server.port=80"
      # NOTICE: We don't define routers here, we do it via global dynamic config
      # so we don't mess this file up with complex regex

networks:
  traefik:
    name: traefik
    external: true
