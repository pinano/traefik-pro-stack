services:

  # ===========================
  #  DASHBOARD (SSO + Admin UI)
  # ===========================
  dashboard:
    build: ./config/dashboard
    restart: unless-stopped
    networks:
      - traefik
    environment:
      - DASHBOARD_ADMIN_USER=${DASHBOARD_ADMIN_USER}
      - DASHBOARD_ADMIN_PASSWORD=${DASHBOARD_ADMIN_PASSWORD}
      - FLASK_SECRET_KEY=${DASHBOARD_SECRET_KEY:-}
      - DOMAIN=${DOMAIN}
      - PROJECT_NAME=${PROJECT_NAME}
      - DASHBOARD_APP_PATH_HOST=${DASHBOARD_APP_PATH_HOST}
      - TZ=${TZ}
      - DASHBOARD_INTERNAL=true
      - TRAEFIK_ACME_ENV_TYPE=${TRAEFIK_ACME_ENV_TYPE}
      - DASHBOARD_SUBDOMAIN=${DASHBOARD_SUBDOMAIN}
      - DASHBOARD_ANUBIS_SUBDOMAIN=${DASHBOARD_ANUBIS_SUBDOMAIN:-}
      - CROWDSEC_ENABLE=${CROWDSEC_ENABLE:-true}
      - BACKREST_ENABLE=${BACKREST_ENABLE:-true}
      - PHPMYADMIN_ENABLE=${PHPMYADMIN_ENABLE:-true}
      - FILEBROWSER_ENABLE=${FILEBROWSER_ENABLE:-true}
      - APACHE_HOST_IP=${APACHE_HOST_IP:-172.17.0.1}
      - APACHE_HOST_PORT=${APACHE_HOST_PORT:-8080}
    working_dir: ${DASHBOARD_APP_PATH_HOST}/config/dashboard
    volumes:
      - ./VERSION:${DASHBOARD_APP_PATH_HOST}/VERSION:ro
      - ./domains.csv:${DASHBOARD_APP_PATH_HOST}/domains.csv
      - ./.env:${DASHBOARD_APP_PATH_HOST}/.env:ro
      - ./.env.dist:${DASHBOARD_APP_PATH_HOST}/.env.dist:ro
      - ./scripts:${DASHBOARD_APP_PATH_HOST}/scripts:ro
      - ./docker-compose-edge.yaml:${DASHBOARD_APP_PATH_HOST}/docker-compose-edge.yaml:ro
      - ./docker-compose-security.yaml:${DASHBOARD_APP_PATH_HOST}/docker-compose-security.yaml:ro
      - ./docker-compose-anubis.yaml:${DASHBOARD_APP_PATH_HOST}/docker-compose-anubis.yaml:ro
      - ./docker-compose-anubis-generated.yaml:${DASHBOARD_APP_PATH_HOST}/docker-compose-anubis-generated.yaml
      - ./docker-compose-apache-logs.yaml:${DASHBOARD_APP_PATH_HOST}/docker-compose-apache-logs.yaml:ro
      - ./docker-compose-observability.yaml:${DASHBOARD_APP_PATH_HOST}/docker-compose-observability.yaml:ro
      - ./docker-compose-dashboard.yaml:${DASHBOARD_APP_PATH_HOST}/docker-compose-dashboard.yaml:ro
      - ./docker-compose-backrest.yaml:${DASHBOARD_APP_PATH_HOST}/docker-compose-backrest.yaml:ro
      - ./docker-compose-phpmyadmin.yaml:${DASHBOARD_APP_PATH_HOST}/docker-compose-phpmyadmin.yaml:ro
      - ./docker-compose-filebrowser.yaml:${DASHBOARD_APP_PATH_HOST}/docker-compose-filebrowser.yaml:ro
      - ./docker-compose-maintenance.yaml:${DASHBOARD_APP_PATH_HOST}/docker-compose-maintenance.yaml:ro
      - ./config:${DASHBOARD_APP_PATH_HOST}/config
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/hosts:/etc/hosts-host:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.services.dashboard.loadbalancer.server.port=5000"
      # --- SSO Middlewares Definition (to be used by other services) ---
      # 1. Forward Auth: checks /auth-check
      - "traefik.http.middlewares.dashboard-auth.forwardauth.address=http://dashboard:5000/auth-check"
      - "traefik.http.middlewares.dashboard-auth.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.dashboard-auth.forwardauth.maxResponseBodySize=1048576" # 1MB cap
      # Pass the authenticated user identity to downstream services (e.g. Grafana Auth Proxy)
      - "traefik.http.middlewares.dashboard-auth.forwardauth.authResponseHeaders=X-Webauth-User,X-Webauth-Role"
      # 2. Error Page: Redirects 401 and 403 to /login
      - "traefik.http.middlewares.dashboard-error.errors.status=401-403"
      - "traefik.http.middlewares.dashboard-error.errors.service=dashboard@docker"
      - "traefik.http.middlewares.dashboard-error.errors.query=/login"
    security_opt:
      - no-new-privileges=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:5000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: 0.10
          memory: 512M

  # ===========================
  #  DOZZLE (Container log viewer)
  # ===========================
  dozzle:
    image: amir20/dozzle:v10.6.5
    restart: always
    networks:
      - traefik
    environment:
      - DOZZLE_BASE=/dozzle
      - DOZZLE_HOSTNAME=${DOMAIN}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges=true
    deploy:
      resources:
        limits:
          cpus: 0.10
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # Service: Tell Traefik that Dozzle listens on internal port 8080
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"

  # ===========================
  #  WATCHDOG (SSL, DNS, CrowdSec health monitor → Telegram)
  # ===========================
  watchdog:
    build: ./config/watchdog
    restart: unless-stopped
    networks:
      - traefik
    # Run all check scripts in parallel with independent intervals
    # check-certs.sh: every 24h, check-dns.sh: every WATCHDOG_DNS_CHECK_INTERVAL
    # check-crowdsec.sh: every WATCHDOG_CROWDSEC_CHECK_INTERVAL (default 1h)
    # check-system.sh: every WATCHDOG_SYSTEM_CHECK_INTERVAL (default 5m)
    # check-traefik.sh: every WATCHDOG_TRAEFIK_CHECK_INTERVAL (default 5m)
    entrypoint: >
      sh -c "
        # Trap SIGTERM/INT to kill all background jobs on stop
        trap 'kill 0' TERM INT;
        # Start certificate check loop in background
        (while true; do
          sh /check-certs.sh;
          echo 'Cert check: sleeping for 24h...';
          sleep 86400;
        done) &
        # Start CrowdSec check loop in background (if enabled)
        (if [ \"$${CROWDSEC_ENABLE}\" != \"false\" ]; then
          while true; do
            sh /check-crowdsec.sh;
            echo \"CrowdSec check: sleeping for $${WATCHDOG_CROWDSEC_CHECK_INTERVAL:-3600}s...\";
            sleep $${WATCHDOG_CROWDSEC_CHECK_INTERVAL:-3600};
          done
        else
          echo 'CrowdSec check DISABLED.';
        fi) &
        # Start System check loop in background
        (while true; do
          sh /check-system.sh;
          echo \"System check: sleeping for $${WATCHDOG_SYSTEM_CHECK_INTERVAL:-300}s...\";
          sleep $${WATCHDOG_SYSTEM_CHECK_INTERVAL:-300};
        done) &
        # Start Traefik check loop in background
        (while true; do
          sh /check-traefik.sh;
          echo \"Traefik check: sleeping for $${WATCHDOG_TRAEFIK_CHECK_INTERVAL:-300}s...\";
          sleep $${WATCHDOG_TRAEFIK_CHECK_INTERVAL:-300};
        done) &
        # Start DNS check loop in foreground (wait for background jobs too)
        while true; do
          sh /check-dns.sh;
          echo \"DNS check: sleeping for $${WATCHDOG_DNS_CHECK_INTERVAL:-21600}s...\";
          sleep $${WATCHDOG_DNS_CHECK_INTERVAL:-21600};
        done
      "
    volumes:
      - ./config/traefik/acme.json:/acme.json:ro
      - ./config/watchdog/check-certs.sh:/check-certs.sh:ro
      - ./config/watchdog/check-dns.sh:/check-dns.sh:ro
      - ./config/watchdog/check-crowdsec.sh:/check-crowdsec.sh:ro
      - ./config/watchdog/check-system.sh:/check-system.sh:ro
      - ./config/watchdog/check-traefik.sh:/check-traefik.sh:ro
      - ./domains.csv:/domains.csv:ro
      # Docker socket for CrowdSec container inspection
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - WATCHDOG_TELEGRAM_BOT_TOKEN=${WATCHDOG_TELEGRAM_BOT_TOKEN}
      - WATCHDOG_TELEGRAM_RECIPIENT_ID=${WATCHDOG_TELEGRAM_RECIPIENT_ID}
      - SERVER_DOMAIN=${DOMAIN} # For customizing the alert message
      - WATCHDOG_CERT_DAYS_WARNING=${WATCHDOG_CERT_DAYS_WARNING}
      - TZ=${TZ}
      - TRAEFIK_LISTEN_IP=${TRAEFIK_LISTEN_IP}
      - WATCHDOG_DNS_CHECK_INTERVAL=${WATCHDOG_DNS_CHECK_INTERVAL:-21600}
      - WATCHDOG_CROWDSEC_CHECK_INTERVAL=${WATCHDOG_CROWDSEC_CHECK_INTERVAL:-3600}
      - WATCHDOG_SYSTEM_CHECK_INTERVAL=${WATCHDOG_SYSTEM_CHECK_INTERVAL:-300}
      - WATCHDOG_TRAEFIK_CHECK_INTERVAL=${WATCHDOG_TRAEFIK_CHECK_INTERVAL:-300}
      - CROWDSEC_CONTAINER=crowdsec
      - DASHBOARD_SUBDOMAIN=${DASHBOARD_SUBDOMAIN}
      - CROWDSEC_ENABLE=${CROWDSEC_ENABLE:-true}
      - PROJECT_NAME=${PROJECT_NAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - TRAEFIK_ACME_ENV_TYPE=${TRAEFIK_ACME_ENV_TYPE}
    security_opt:
      - no-new-privileges=true
    deploy:
      resources:
        limits:
          cpus: 0.10
          memory: 96M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================
  #  CTOP: Explicitly invoked with: docker compose run --rm ctop
  # ===========================
  ctop:
    image: quay.io/vektorlab/ctop:0.7.7
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    profiles: [ "tools" ] # Trick: This way it doesn't start automatically, only if explicitly requested

networks:
  traefik:
    name: traefik
    external: true
