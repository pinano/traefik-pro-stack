services:

  # ===========================
  #  GRAFANA (The visualizer)
  # ===========================
  grafana:
    image: grafana/grafana:12.4.0
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=https://${DASHBOARD_SUBDOMAIN}.${DOMAIN}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false # Important: Disallow user registration
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
      - TZ=${TZ}
      - DOMAIN=${DOMAIN}
      # Telegram credentials — shared with Watchdog, used by Grafana Alerting provisioning
      - GRAFANA_TELEGRAM_BOT_TOKEN=${WATCHDOG_TELEGRAM_BOT_TOKEN}
      - GRAFANA_TELEGRAM_CHAT_ID=${WATCHDOG_TELEGRAM_RECIPIENT_ID}
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - traefik
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # Dashboard
      - "traefik.http.routers.grafana-frontend.rule=Host(`${DASHBOARD_SUBDOMAIN}.${DOMAIN}`) && PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana-frontend.priority=100"
      - "traefik.http.routers.grafana-frontend.entrypoints=websecure"
      - "traefik.http.routers.grafana-frontend.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      # Middleware: SSO (Error middleware must be first)
      - "traefik.http.routers.grafana-frontend.middlewares=dashboard-error@docker,dashboard-auth@docker"
      # Service: Tell Traefik that Grafana listens on internal port 3000
      - "traefik.http.services.grafana-frontend.loadbalancer.server.port=3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================
  #  LOKI (Log storage)
  # ===========================
  loki:
    image: grafana/loki:3.6.7
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/loki/config.yaml:/etc/loki/local-config.yaml:ro
      - ./data/loki:/loki
    environment:
      - TZ=${TZ}
    networks:
      - traefik
    # Resource limits so it doesn't consume all RAM during compaction
    deploy:
      resources:
        limits:
          memory: 2G
    # Log rotation for Loki itself (Meta-logs)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================
  #  ALLOY (Log & metrics collector)
  # ===========================
  alloy:
    image: grafana/alloy:v1.13.2
    restart: unless-stopped
    user: "root" # Alloy needs root to read logs from other containers in /var/lib/docker
    environment:
      - TZ=${TZ}
      - DOMAIN=${DOMAIN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./data/alloy:/var/lib/alloy
      - /etc/localtime:/etc/localtime:ro
      # Host mounts for prometheus.exporter.unix (Node Exporter equivalent)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    # Alloy needs the 'run' argument and also to point at the config file
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    networks:
      - traefik
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================
  #  PROMETHEUS (Metrics storage)
  # ===========================
  prometheus:
    image: prom/prometheus:v3.11.1
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_DAYS:-15}d'
      - '--storage.tsdb.wal-compression'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-lifecycle'
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - ./data/prometheus:/prometheus
    networks:
      - traefik
    deploy:
      resources:
        limits:
          memory: ${PROMETHEUS_MEM_LIMIT:-512M}
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  traefik:
    name: traefik
    external: true
