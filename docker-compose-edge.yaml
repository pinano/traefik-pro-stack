services:

  # ===========================
  #  TRAEFIK (Edge Router)
  # ===========================
  traefik:
    image: traefik:v3.6.9
    restart: always
    ports:
      - "${TRAEFIK_LISTEN_IP:-0.0.0.0}:80:80"
      - "${TRAEFIK_LISTEN_IP:-0.0.0.0}:443:443"
    networks:
      - traefik
    sysctls:
      - net.core.somaxconn=4096
      - net.ipv4.tcp_max_syn_backlog=4096
      - net.ipv4.tcp_syncookies=1
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.tcp_keepalive_time=60
    environment:
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/acme.json:/acme.json
      - ./config/traefik/certs-local-dev:/certs:ro
      - ./config/traefik/traefik-generated.yaml:/traefik.yaml:ro
      # Folder for dynamic configuration generated by the Python script
      - ./config/traefik/dynamic-config:/dynamic-config:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # Restart on config change
      #- "traefik.config.hash=${TRAEFIK_CONFIG_HASH}"
      # Dashboard
      - "traefik.http.routers.traefik.rule=Host(`${DASHBOARD_SUBDOMAIN}.${DOMAIN}`) && (PathPrefix(`/traefik`) || PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.traefik.priority=100"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      # Middleware: SSO + StripPrefix (Error middleware MUST be first to catch 401 from Auth)
      - "traefik.http.routers.traefik.middlewares=dashboard-error@docker,dashboard-auth@docker,traefik-strip"
      - "traefik.http.middlewares.traefik-strip.stripprefix.prefixes=/traefik"
    deploy:
      resources:
        reservations:
          cpus: '0.10'
          memory: 1G
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m" # Max 50MB per log file
        max-file: "3" # Keep only 3 files (current + 2 rotated)

networks:
  traefik:
    name: traefik
    external: true
