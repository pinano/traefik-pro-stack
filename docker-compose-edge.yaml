services:

  # ===========================
  #  TRAEFIK (Edge Router)
  # ===========================
  traefik:
    image: traefik:v3.7.6
    restart: always
    ports:
      - "${TRAEFIK_LISTEN_IP:-0.0.0.0}:80:80"
      - "${TRAEFIK_LISTEN_IP:-0.0.0.0}:443:443"
      - "${TRAEFIK_LISTEN_IP:-0.0.0.0}:443:443/udp"  # HTTP/3 (QUIC)
    networks:
      - traefik
    sysctls:
      - net.core.somaxconn=4096
      - net.ipv4.tcp_max_syn_backlog=4096
      - net.ipv4.tcp_syncookies=1
      - net.ipv4.tcp_fin_timeout=15
      - net.ipv4.tcp_tw_reuse=1
      - net.ipv4.tcp_keepalive_time=60
    environment:
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/acme.json:/acme.json
      - ./config/traefik/certs-local-dev:/certs:ro
      - ./config/traefik/traefik-generated.yaml:/traefik.yaml:ro
      - ./config/traefik/captcha.html:/captcha.html:ro
      # Folder for dynamic configuration generated by the Python script
      - ./config/traefik/dynamic-config:/dynamic-config:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # Dashboard is now handled dynamically by generate-config.py to support conditional TLS
      # Watchdog internal API router (only accessible on internal port 8080)
      - "traefik.http.routers.watchdog-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.watchdog-api.entrypoints=traefik"
      - "traefik.http.routers.watchdog-api.service=api@internal"
    security_opt:
      - no-new-privileges=true
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        reservations:
          cpus: '0.10'
          memory: 1G
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m" # Max 50MB per log file
        max-file: "3" # Keep only 3 files (current + 2 rotated)

networks:
  traefik:
    name: traefik
    external: true
