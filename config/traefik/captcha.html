<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Check</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f9fafb;
      color: #374151;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 400px;
      width: 90%;
      padding: 2rem;
      text-align: center;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      box-sizing: border-box;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      margin-top: 0;
      color: #111827;
    }
    p {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 2rem;
      margin-top: 0;
      line-height: 1.5;
    }
    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #9ca3af;
    }
    .captcha-wrapper {
      display: flex;
      justify-content: center;
      min-height: 65px; /* Minimum height to avoid layout shift when widget loads */
    }
  </style>
  <script src="{{ .FrontendJS }}" async defer></script>
</head>
<body>
  <div class="container">
    <h1>Security Check</h1>
    <p>We are verifying that you are human before granting access to the requested page.</p>
    
    <form action="" method="POST" id="captcha-form">
      <div class="captcha-wrapper">
        <div id="captcha" class="{{ .FrontendKey }}" data-sitekey="{{ .SiteKey }}" data-callback="captchaCallback"></div>
      </div>
    </form>
    
    <div class="footer">
      Protected by CrowdSec
    </div>
  </div>

  <script>
    function captchaCallback() {
      setTimeout(() => document.querySelector('#captcha-form').submit(), 500);
    }
  </script>
</body>
</html>
