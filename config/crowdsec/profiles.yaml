# =============================================================================
# Profile 0: AppSec (WAF) Alerts (48h ban)
# -----------------------------------------------------------------------------
# Detections from the WAF engine result in an immediate 48h ban.
# WAF alerts have very high confidence.

name: appsec_ban
filters:
 - Alert.Remediation == true && Alert.GetScope() == "Ip" && Alert.GetScenario() contains "appsec"
decisions:
 - type: ban
   duration: 48h
on_success: break

---

# -----------------------------------------------------------------------------
# Profile 1: Repeat Offenders (7-day ban)
# -----------------------------------------------------------------------------
# If an IP triggers multiple alerts (>5 events), apply a 7-day ban.
# This catches persistent attackers who keep probing after initial bans.

name: repeat_offender
filters:
 - Alert.Remediation == true && Alert.GetScope() == "Ip" && len(Alert.Events) > 5
decisions:
 - type: ban
   duration: 168h  # 7 days
on_success: break

---

# -----------------------------------------------------------------------------
# Profile 2: CAPTCHA Remediation for HTTP Scenarios (4 hours)
# -----------------------------------------------------------------------------
# HTTP-based attacks (crawlers, bad bots) get a CAPTCHA instead of a ban.
# Excludes AppSec (WAF) since those are high-confidence malicious.

name: captcha_remediation
filters:
 - Alert.Remediation == true && Alert.GetScope() == "Ip" && Alert.GetScenario() contains "http" && !(Alert.GetScenario() contains "appsec")
decisions:
 - type: captcha
   duration: 4h
on_success: break

---

# -----------------------------------------------------------------------------
# Profile 3: Standard Aggressive Ban (24 hours)
# -----------------------------------------------------------------------------
# Default ban duration increased from 4h to 24h for all IP-based remediation.

name: aggressive_ban
filters:
 - Alert.Remediation == true && Alert.GetScope() == "Ip"
decisions:
 - type: ban
   duration: 24h   # 24 hours (default is 4h)
on_success: break

---

# -----------------------------------------------------------------------------
# Profile 4: Range-based Attacks (48 hours)
# -----------------------------------------------------------------------------
# If the attack targets a range (subnet), apply a 48-hour ban to the range.

name: range_ban
filters:
 - Alert.Remediation == true && Alert.GetScope() == "Range"
decisions:
 - type: ban
   duration: 48h
on_success: break
