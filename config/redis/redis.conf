# === REDIS CONFIG ===

# Listen on all interfaces (inside docker network)
bind 0.0.0.0
# Password is required (populated dynamically by start.sh)
requirepass REDIS_PASSWORD_PLACEHOLDER
protected-mode yes
port 6379

# --- MEMORY MANAGEMENT (CRITICAL) ---
# We limit Redis to 256MB. If Anubis needs more for 100 domains,
# something is weird. This protects the Host from dying by OOM.
maxmemory 256mb

# If full, delete least recently used keys (LRU).
# This way the service never stops, just forgets old sessions.
maxmemory-policy allkeys-lru

# --- PERSISTENCE (DISABLED FOR IN-MEMORY PERFORMANCE) ---
# 1. RDB (Snapshots): Disabled to prevent disk writes.
save ""

# 2. AOF (Append Only File): Disabled to keep Valkey purely in-memory.
appendonly no

# --- MISC ---
# Disable latency on inactive connections
tcp-keepalive 300
loglevel notice
