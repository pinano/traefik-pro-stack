services:

  # ===========================
  #  CROWDSEC (IPS / WAF)
  # ===========================
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.8
    restart: unless-stopped
    profiles:
      - crowdsec
    environment:
      GID: "1000"
      COLLECTIONS: ${CROWDSEC_COLLECTIONS}
      TZ: ${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/crowdsec/db:/var/lib/crowdsec/data/
      - ./config/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml
      - ./config/crowdsec/acquis-base.yaml:/etc/crowdsec/acquis-base.yaml:ro
      - ./config/crowdsec/profiles.yaml:/etc/crowdsec/profiles.yaml
      - ./config/crowdsec/profiles-base.yaml:/etc/crowdsec/profiles-base.yaml:ro
      # Custom parsers (includes IP whitelist generated by start.sh)
      - ./config/crowdsec/parsers:/etc/crowdsec/parsers/s02-enrich/custom:ro
      # Custom scenarios (e.g. 429 flood detection)
      - ./config/crowdsec/scenarios:/etc/crowdsec/scenarios/custom:ro
      # Add the socket to read Traefik logs directly from Docker
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "7422" # AppSec WAF listener (internal, traefik network only)
    networks:
      - traefik
    security_opt:
      - no-new-privileges=true
    deploy:
      resources:
        reservations:
          cpus: '0.10'
          memory: 1G
        limits:
          memory: 2G
    healthcheck:
      test: [ "CMD", "cscli", "lapi", "status" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===========================
  #  REDIS (Session cache for Anubis PoW + CrowdSec ban cache)
  # ===========================
  redis:
    image: valkey/valkey:9.0.4-alpine
    command: redis-server /redis.conf --requirepass "${REDIS_PASSWORD}"
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/redis/redis.conf:/redis.conf:ro
    networks:
      - anubis-backend
      - traefik
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================
  #  REDIS EXPORTER (Metrics for Prometheus)
  # ===========================
  redis-exporter:
    image: oliver006/redis_exporter:v1.83.0
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - traefik
    deploy:
      resources:
        limits:
          memory: 128M

  # ===========================
  #  CROWDSEC WEB UI (Management interface for CrowdSec LAPI)
  # ===========================
  crowdsec-web-ui:
    image: ghcr.io/theduffman85/crowdsec-web-ui:2026.5.4
    restart: unless-stopped
    environment:
      - CROWDSEC_URL=http://crowdsec:8080
      - CROWDSEC_USER=${CROWDSEC_WEB_UI_USER:-crowdsec-web-ui}
      - CROWDSEC_PASSWORD=${CROWDSEC_WEB_UI_PASSWORD}
      - BASE_PATH=/crowdsec
      - TRUSTED_IPS=${CROWDSEC_WEB_UI_TRUSTED_IPS:-172.16.0.0/12}
      - TZ=${TZ}
    volumes:
      - ./config/crowdsec-web-ui:/app/data
      - /etc/localtime:/etc/localtime:ro
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # Routing
      - "traefik.http.routers.crowdsec-web-ui.rule=Host(`${DASHBOARD_SUBDOMAIN}.${DOMAIN}`) && PathPrefix(`/crowdsec`)"
      - "traefik.http.routers.crowdsec-web-ui.priority=100"
      - "traefik.http.routers.crowdsec-web-ui.entrypoints=websecure"
      - "traefik.http.routers.crowdsec-web-ui.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      # Middleware: SSO protection
      - "traefik.http.routers.crowdsec-web-ui.middlewares=dashboard-error@docker,dashboard-auth@docker"
      # Internal port
      - "traefik.http.services.crowdsec-web-ui.loadbalancer.server.port=3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  traefik:
    name: traefik
    external: true
  anubis-backend:
    external: true
