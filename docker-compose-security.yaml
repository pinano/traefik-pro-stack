services:

  # ===========================
  #  CROWDSEC (IPS / WAF)
  # ===========================
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.8
    restart: unless-stopped
    profiles:
      - crowdsec
    environment:
      GID: "1000"
      COLLECTIONS: ${CROWDSEC_COLLECTIONS}
      TZ: ${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/crowdsec/db:/var/lib/crowdsec/data/
      - ./config/crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml
      - ./config/crowdsec/acquis-base.yaml:/etc/crowdsec/acquis-base.yaml:ro
      - ./config/crowdsec/profiles.yaml:/etc/crowdsec/profiles.yaml
      - ./config/crowdsec/profiles-base.yaml:/etc/crowdsec/profiles-base.yaml:ro
      # Custom overrides via local config file (overrides container's config.yaml parameters)
      - ./config/crowdsec/config.yaml.local:/etc/crowdsec/config.yaml.local:ro
      # Custom parsers (includes IP whitelist generated by start.sh)
      - ./config/crowdsec/parsers:/etc/crowdsec/parsers/s02-enrich/custom:ro
      # Custom scenarios (e.g. 429 flood detection)
      - ./config/crowdsec/scenarios:/etc/crowdsec/scenarios/custom:ro
      # Add the socket to read Traefik logs directly from Docker
      - /var/run/docker.sock:/var/run/docker.sock:ro
    expose:
      - "7422" # AppSec WAF listener (internal, traefik network only)
      - "6060" # Prometheus metrics (internal, traefik network only)
    networks:
      - traefik
    security_opt:
      - no-new-privileges=true
    deploy:
      resources:
        reservations:
          cpus: '0.10'
          memory: 1G
        limits:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "cscli", "lapi", "status" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===========================
  #  REDIS (Session cache for Anubis PoW + CrowdSec ban cache)
  # ===========================
  redis:
    image: valkey/valkey:9.1.0-alpine
    command: valkey-server /valkey.conf
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config/valkey/valkey-generated.conf:/valkey.conf:ro
    networks:
      - anubis-backend
      - traefik
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    security_opt:
      - no-new-privileges=true
    healthcheck:
      test: [ "CMD", "valkey-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ===========================
  #  REDIS EXPORTER (Metrics for Prometheus)
  # ===========================
  redis-exporter:
    image: oliver006/redis_exporter:v1.87.0
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    networks:
      - traefik
    security_opt:
      - no-new-privileges=true
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ===========================
  #  CROWDSEC WEB UI (Management interface for CrowdSec LAPI)
  # ===========================
  crowdsec-web-ui:
    image: ghcr.io/theduffman85/crowdsec-web-ui:2026.7.16
    restart: unless-stopped
    command: ["node", "dist/server/index.js"]
    environment:
      - CROWDSEC_URL=http://crowdsec:8080
      - CROWDSEC_USER=${CROWDSEC_WEB_UI_USER:-crowdsec-web-ui}
      - CROWDSEC_PASSWORD=${CROWDSEC_WEB_UI_PASSWORD:-}
      - BASE_PATH=/crowdsec
      - TZ=${TZ}
      - NODE_OPTIONS=--max-old-space-size=256
      - CROWDSEC_LOOKBACK_PERIOD=${CROWDSEC_LOOKBACK_PERIOD:-24h}
      - CROWDSEC_PROMETHEUS_URL=http://crowdsec:6060/metrics
    volumes:
      - ./config/crowdsec-web-ui:/app/data
      - /etc/localtime:/etc/localtime:ro
    networks:
      - traefik
    security_opt:
      - no-new-privileges=true
    healthcheck:
      # Use node (guaranteed in this image) instead of wget (not available in Node.js images).
      # A failing healthcheck causes Traefik to remove the container from its routing table,
      # making all /crowdsec requests fall through to the dashboard catch-all router.
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      # Router is generated dynamically by generate-config.py (inherits full security middleware chain)
      # Internal port
      - "traefik.http.services.crowdsec-web-ui.loadbalancer.server.port=3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  traefik:
    name: traefik
    external: true
  anubis-backend:
    external: true
